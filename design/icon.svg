<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>video-subtitle-remover</title>
  <desc>자막 제거 도구 앱 아이콘</desc>

  <!-- 배경: 시안 라운드 사각형 -->
  <rect width="1024" height="1024" rx="232" fill="#06B6D4"/>

  <!-- 우하단 네이비 사선 오버레이 -->
  <path d="M 1024 0 L 1024 1024 L 280 1024 Z" fill="#1E40AF" opacity="0.85"/>

  <!-- 보케 광원 -->
  <circle cx="220" cy="200" r="130" fill="#FFFFFF" opacity="0.14"/>
  <circle cx="900" cy="170" r="55" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="540" cy="150" r="35" fill="#FFFFFF" opacity="0.18"/>

  <!-- 자막바 (흰색) -->
  <rect x="220" y="430" width="584" height="200" rx="36" fill="#FFFFFF"/>
  <rect x="280" y="475" width="280" height="22" rx="6" fill="#1E40AF" opacity="0.7"/>
  <rect x="280" y="510" width="380" height="22" rx="6" fill="#1E40AF" opacity="0.55"/>
  <rect x="280" y="545" width="220" height="22" rx="6" fill="#1E40AF" opacity="0.4"/>
  <rect x="280" y="580" width="180" height="22" rx="6" fill="#1E40AF" opacity="0.25"/>

  <!-- 매직 스트로크 (자막 제거 효과) -->
  <line x1="850" y1="320" x2="500" y2="700"
        stroke="#FBBF24" stroke-width="44" stroke-linecap="round"/>

  <!-- 스파클 -->
  <polygon points="900,260 920,300 900,340 880,300" fill="#FBBF24"/>
  <circle cx="800" cy="220" r="14" fill="#FBBF24"/>
  <circle cx="450" cy="780" r="10" fill="#FBBF24"/>
</svg>
