# 모델 선택 시 카드 본문에 동적으로 표시되는 설명 (\\n 으로 줄바꿈)
# (M5 Pro 측정 → M4 Pro 맥미니 +10% 보수적 추정)
[InpaintModeContent]
SttnAuto = 영상 흐름 기반 자막 영역 자동 추정 + 시간축 참조로 자연스럽게 채움.\n자막 흔적 거의 없이 깔끔.\n\n처리 시간\n  · 15초 영상 → 약 55초\n  · 30초 영상 → 약 2분\n  · 1분 영상 → 약 4분 30초\n\n※ 영구 자막(영상 내내 같은 위치)은 시간축 참조도 자막이라 일부 잔존할 수 있어요.
SttnDet = (숨김)
LAMA = (숨김)
ProPainter = (숨김)
OpenCV = 글자 형태 마스크에 단순 알고리즘으로 채우는 프리즘 방식.\n자막 모양대로 흐릿한 자국이 살짝 남지만, 영구 자막도 일관 처리.\n\n처리 시간\n  · 15초 영상 → 약 35초\n  · 30초 영상 → 약 1분 30초\n  · 1분 영상 → 약 3분 30초

